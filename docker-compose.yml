services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  frontend:
    image: ghcr.io/aacienfuegos/agentos-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    image: ghcr.io/aacienfuegos/agentos-backend:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/agentos.db
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NTFY_URL=${NTFY_URL:-}
      - MONTHLY_BUDGET_USD=${MONTHLY_BUDGET_USD:-50}
    volumes:
      - backend_data:/data
      - ./agents_config:/app/agents_config
      - /var/run/docker.sock:/var/run/docker.sock
      - claude_config:/home/worker
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    image: ghcr.io/aacienfuegos/agentos-backend:latest
    command: python -m arq agentos.worker.tasks.WorkerSettings
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/agentos.db
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - NTFY_URL=${NTFY_URL:-}
      - MONTHLY_BUDGET_USD=${MONTHLY_BUDGET_USD:-50}
    volumes:
      - backend_data:/data
      - ./agents_config:/app/agents_config
      - /var/run/docker.sock:/var/run/docker.sock
      - claude_config:/home/worker
      # Knowledge agents con rutas externas: monta aquí los directorios del host.
      # Ejemplo: - ${HOME}/docu:/knowledge:rw
      # Luego pon knowledge_path=/knowledge/homelab en la config del agente.
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  backend_data:
  redis_data:
  claude_config:
