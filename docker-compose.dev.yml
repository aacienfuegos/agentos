# Dev: Redis + Backend + Worker en Docker (hot reload), Frontend nativo
# Arrancar: ./dev.sh  (o ver README para pasos manuales)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/agentos.db
      - REDIS_URL=redis://redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-dev-secret}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - NTFY_URL=${NTFY_URL:-}
      - ENV=development
    volumes:
      - ./backend/agentos:/app/agentos   # hot reload del código Python
      - backend_data:/data
      - ./agents_config:/app/agents_config
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    command: uv run uvicorn agentos.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/agentos.db
      - REDIS_URL=redis://redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - NTFY_URL=${NTFY_URL:-}
      - ENV=development
    volumes:
      - ./backend/agentos:/app/agentos
      - backend_data:/data
      - ./agents_config:/app/agents_config
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.claude:/home/worker/.claude:ro
      - ${HOME}/.claude.json:/home/worker/.claude.json:ro
    depends_on:
      redis:
        condition: service_healthy
    command: uv run watchfiles "python -m arq agentos.worker.tasks.WorkerSettings" agentos

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# Frontend: correr nativo con "cd frontend && npm run dev"
# Ver dev.sh para el script completo de arranque

volumes:
  backend_data:
  redis_data:
