name: Build and Push Staging Images

on:
  push:
    branches:
      - develop

concurrency:
  group: build-staging
  cancel-in-progress: true

jobs:
  checks:
    name: Tests, tipos y auditoría de seguridad
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Backend (Python + uv) ──────────────────────────────────────────────
      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Instalar dependencias Python
        run: uv sync --frozen
        working-directory: backend

      - name: Tests backend
        run: uv run pytest
        working-directory: backend

      - name: Auditoría de seguridad Python
        run: uv run pip-audit
        working-directory: backend

      # ── Frontend (Node.js + npm) ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias Node.js
        run: npm ci
        working-directory: frontend

      - name: Type check frontend
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Auditoría de seguridad npm
        run: npm audit --audit-level=moderate
        working-directory: frontend

  build:
    name: Build, scan y push ${{ matrix.service }}
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login a ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build imagen (local, para scan)
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          load: true
          push: false
          tags: ghcr.io/aacienfuegos/agentos-${{ matrix.service }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Instalar Trivy v0.71.0
        run: |
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v0.71.0/trivy_0.71.0_Linux-64bit.tar.gz" \
            -O /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Scan de seguridad con Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --vuln-type os,library \
            ghcr.io/aacienfuegos/agentos-${{ matrix.service }}:staging

      - name: Push imagen
        run: docker push ghcr.io/aacienfuegos/agentos-${{ matrix.service }}:staging
